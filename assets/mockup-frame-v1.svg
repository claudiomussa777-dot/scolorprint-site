<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="frameOuter" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#3a2d1e"/>
      <stop offset="1" stop-color="#1d160b"/>
    </linearGradient>
    <linearGradient id="frameMat" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ece7d6"/>
    </linearGradient>
    <filter id="frameShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="11"/>
      <feOffset dx="0" dy="18"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.38"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="300" cy="555" rx="195" ry="10" fill="#000" opacity=".22"/>
  <g filter="url(#frameShadow)">
    <rect x="110" y="80" width="380" height="450" rx="6" fill="url(#frameOuter)"/>
    <rect x="135" y="105" width="330" height="400" rx="3" fill="url(#frameMat)"/>
    <rect x="160" y="130" width="280" height="350" fill="#f8f5ea" stroke="#cfc9b8" stroke-width="1"/>
  </g>
</svg>

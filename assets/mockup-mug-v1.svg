      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".55" stop-color="#f6f4ef"/>
      <stop offset="1" stop-color="#cfccc3"/>
    </linearGradient>
    <radialGradient id="mugTop" cx=".5" cy=".4" r=".7">
      <stop offset="0" stop-color="#3a3a3a"/>
      <stop offset="1" stop-color="#161616"/>

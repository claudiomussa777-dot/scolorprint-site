<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="toteBody" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f8f4e6"/>
      <stop offset="1" stop-color="#c8c1ab"/>
    </linearGradient>
    <filter id="toteShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="9"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.32"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="300" cy="555" rx="180" ry="12" fill="#000" opacity=".22"/>
  <g filter="url(#toteShadow)">
    <!-- handles -->
    <path d="M225 175 q0 -110 75 -110 q75 0 75 110" fill="none" stroke="#a59a7e" stroke-width="14" stroke-linecap="round"/>
    <!-- bag body -->
    <path d="M165 175 L435 175 L455 545 L145 545 Z" fill="url(#toteBody)" stroke="#a59a7e" stroke-width="2.5"/>
    <!-- canvas weave hint -->
    <line x1="165" y1="200" x2="435" y2="200" stroke="#b8ad8e" stroke-width=".5" opacity=".5"/>
    <line x1="160" y1="350" x2="442" y2="350" stroke="#b8ad8e" stroke-width=".5" opacity=".5"/>
    <line x1="155" y1="500" x2="448" y2="500" stroke="#b8ad8e" stroke-width=".5" opacity=".5"/>
  </g>
</svg>

<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bottleBody" x1="0" x2="1">
      <stop offset="0" stop-color="#e8e3d3"/>
      <stop offset=".4" stop-color="#ffffff"/>
      <stop offset=".6" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c0b9a4"/>
    </linearGradient>
    <linearGradient id="bottleCap" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#3a3a3a"/>
      <stop offset="1" stop-color="#1a1a1a"/>
    </linearGradient>
    <filter id="bottleShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="9"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.32"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="300" cy="555" rx="130" ry="11" fill="#000" opacity=".22"/>
  <g filter="url(#bottleShadow)">
    <!-- cap -->
    <rect x="245" y="55" width="110" height="42" rx="6" fill="url(#bottleCap)"/>
    <ellipse cx="300" cy="55" rx="55" ry="8" fill="#444"/>
    <!-- neck -->
    <rect x="260" y="95" width="80" height="30" fill="url(#bottleBody)" stroke="#9c947d" stroke-width="2"/>
    <!-- body -->
    <path d="M220 125 L380 125 L395 525 q-95 18 -190 0 Z" fill="url(#bottleBody)" stroke="#9c947d" stroke-width="2.5"/>
    <!-- highlight -->
    <path d="M255 145 L260 510" fill="none" stroke="#fff" stroke-width="6" opacity=".85" stroke-linecap="round"/>
  </g>
</svg>

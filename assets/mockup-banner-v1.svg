<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bannerStand" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#bcb6a3"/>
      <stop offset="1" stop-color="#7e7967"/>
    </linearGradient>
    <linearGradient id="bannerBody" x1="0" x2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e9e4d3"/>
    </linearGradient>
    <filter id="bannerShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="9"/>
      <feOffset dx="0" dy="16"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="300" cy="558" rx="170" ry="10" fill="#000" opacity=".22"/>
  <g filter="url(#bannerShadow)">
    <ellipse cx="300" cy="548" rx="140" ry="14" fill="url(#bannerStand)"/>
    <rect x="200" y="525" width="200" height="22" rx="4" fill="url(#bannerStand)"/>
    <rect x="295" y="85" width="10" height="445" fill="#a59f8b"/>
    <rect x="160" y="60" width="280" height="50" rx="6" fill="url(#bannerStand)"/>
    <rect x="170" y="100" width="260" height="430" rx="4" fill="url(#bannerBody)" stroke="#c0b9a3" stroke-width="2"/>
  </g>
</svg>

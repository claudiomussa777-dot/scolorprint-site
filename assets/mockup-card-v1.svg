<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardFront" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ece7d6"/>
    </linearGradient>
    <linearGradient id="cardBack" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f0ebda"/>
      <stop offset="1" stop-color="#cdc6b1"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="9"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.32"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="320" cy="510" rx="210" ry="11" fill="#000" opacity=".22"/>
  <g filter="url(#cardShadow)">
    <g transform="rotate(-6 230 320)">
      <rect x="80" y="220" width="320" height="200" rx="9" fill="url(#cardBack)" stroke="#bdb5a0" stroke-width="2"/>
      <rect x="100" y="240" width="120" height="10" rx="3" fill="#bcb39d"/>
      <rect x="100" y="260" width="180" height="6" rx="2" fill="#cec6b0"/>
      <rect x="100" y="275" width="160" height="6" rx="2" fill="#cec6b0"/>
    </g>
    <g transform="rotate(5 380 320)">
      <rect x="200" y="170" width="320" height="200" rx="9" fill="url(#cardFront)" stroke="#bdb5a0" stroke-width="2"/>
    </g>
  </g>
</svg>

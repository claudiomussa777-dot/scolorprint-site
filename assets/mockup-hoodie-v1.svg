<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hoodieBody" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ddd9cd"/>
    </linearGradient>
    <linearGradient id="hoodieHood" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f6f3e9"/>
      <stop offset="1" stop-color="#cfc9b8"/>
    </linearGradient>
    <filter id="hoodieShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="9"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.32"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="300" cy="555" rx="190" ry="14" fill="#000" opacity=".22"/>
  <g filter="url(#hoodieShadow)">
    <!-- sleeves -->
    <path d="M120 220 L80 360 L60 480 L160 490 L180 380 L200 280 Z" fill="url(#hoodieBody)" stroke="#b8b3a3" stroke-width="2"/>
    <path d="M480 220 L520 360 L540 480 L440 490 L420 380 L400 280 Z" fill="url(#hoodieBody)" stroke="#b8b3a3" stroke-width="2"/>
    <!-- body -->
    <path d="M200 200 L400 200 L420 540 L180 540 Z" fill="url(#hoodieBody)" stroke="#b8b3a3" stroke-width="2"/>
    <!-- kangaroo pocket -->
    <path d="M225 380 L375 380 L385 470 L215 470 Z" fill="none" stroke="#b8b3a3" stroke-width="2"/>
    <!-- hood -->
    <path d="M210 200 q-30 -80 90 -100 q120 20 90 100 q-10 30 -50 28 l-80 0 q-40 2 -50 -28 z" fill="url(#hoodieHood)" stroke="#a9a392" stroke-width="2"/>
    <!-- neck opening -->
    <path d="M255 215 q15 -25 45 -25 q30 0 45 25" fill="#cfc9b8" stroke="#a9a392" stroke-width="1.5"/>
    <!-- drawstrings -->
    <line x1="278" y1="222" x2="270" y2="290" stroke="#a9a392" stroke-width="3" stroke-linecap="round"/>
    <line x1="322" y1="222" x2="330" y2="285" stroke="#a9a392" stroke-width="3" stroke-linecap="round"/>
    <circle cx="270" cy="292" r="4" fill="#a9a392"/>
    <circle cx="330" cy="287" r="4" fill="#a9a392"/>
  </g>
</svg>

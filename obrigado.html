<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#181818">
  <title>Pedido enviado — S Color Print</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f5f1e8;color:#181818;font-family:"DM Sans",sans-serif;padding:24px}.card{max-width:680px;background:white;padding:clamp(36px,7vw,76px);box-shadow:0 25px 70px #0001;text-align:center;border-top:8px solid #f02d7d}.mark{display:flex;justify-content:center;gap:3px;transform:skew(-9deg);margin-bottom:32px}.mark i{width:10px;height:34px;background:#11c5d9}.mark i:nth-child(2){background:#f02d7d}.mark i:nth-child(3){background:#ffd52b}h1{font:700 clamp(42px,8vw,72px)/.95 "Space Grotesk";letter-spacing:-.05em;margin:0 0 24px}p{color:#666;line-height:1.7;margin:0 auto 32px;max-width:480px}.button{display:inline-flex;background:#181818;color:white;text-decoration:none;padding:16px 24px;font-weight:700}.button:hover{background:#f02d7d}
  </style>
</head>
<body>
  <main class="card">
    <div class="mark" aria-hidden="true"><i></i><i></i><i></i></div>
    <h1>Pedido enviado!</h1>
    <p>Obrigado pelo contacto. A S Color Print recebeu o seu pedido por email e responderá assim que possível.</p>
    <a class="button" href="https://scolorprint.com/">Voltar ao site</a>
  </main>
</body>
</html>
